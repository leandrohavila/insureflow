# Railway — InsureFlow API (legado; preferir /railway.toml na raiz do monorepo)
# https://docs.railway.com/reference/config-as-code
#
# No dashboard: Config file = /railway.toml | Root Directory = vazio (/)

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = ["apps/api/**", "packages/database/**"]

[deploy]
# Sem startCommand — o boot vem do CMD do Dockerfile (WORKDIR apps/api).
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
NODE_ENV = "production"
PORT = "4000"
